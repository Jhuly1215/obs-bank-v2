# Override de DESARROLLO: expone todos los puertos de servicios internos al host
# para que puedas acceder directamente desde el navegador o herramientas locales.
# USO: docker compose -f docker-compose.yml -f deploy/dev-ports.yml up
# NUNCA incluir en el stack de producción.
services:
  prometheus:
    ports:
      - "9090:9090"

  loki:
    ports:
      - "3100:3100"

  tempo:
    ports:
      - "3200:3200"
      - "4319:4317"

  alloy:
    ports:
      - "12345:12345"

  fcm-bridge:
    ports:
      - "5001:8080"

  otel-collector:
    ports:
      - "8889:8889"   # Prometheus scrape del collector

  demo-api:
    ports:
      - "5000:8080"
