server:
  http_listen_port: ${TEMPO_HTTP_LISTEN_PORT:-3200}
  grpc_listen_port: ${TEMPO_FRONTEND_PORT:-9095}

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:${TEMPO_GRPC_LISTEN_PORT:-4317}
        http:
          endpoint: 0.0.0.0:${TEMPO_HTTP_RECEIVER_PORT:-4318}

ingester:
  trace_idle_period: 10s
  max_block_bytes: 104857600
  max_block_duration: 5m

storage:
  trace:
    backend: s3

    wal:
      path: ${TEMPO_STORAGE_DIR:-/var/tempo}/wal

    s3:
      bucket: ${TEMPO_S3_BUCKET:-tempo}
      endpoint: ${TEMPO_S3_ENDPOINT:-minio.ecofuturo.com.bo}
      region: ${TEMPO_S3_REGION:-us-east-1}
      access_key: ${TEMPO_S3_ACCESS_KEY:-admin_ecofuturo}
      secret_key: ${TEMPO_S3_SECRET_KEY}
      insecure: ${TEMPO_S3_INSECURE:-false}
      forcepathstyle: true
      tls_insecure_skip_verify: ${TEMPO_S3_SKIP_VERIFY:-false}

compactor:
  compaction:
    block_retention: ${TEMPO_BLOCK_RETENTION:-2160h}

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s
  metrics:
    max_duration: 3h

metrics_generator:
  registry:
    external_labels:
      source: tempo
  processor:
    local_blocks:
      flush_to_storage: true
  traces_storage:
    path: ${TEMPO_STORAGE_DIR:-/var/tempo}/generator/traces
  storage:
    path: ${TEMPO_STORAGE_DIR:-/var/tempo}/generator/wal
    remote_write:
      - url: ${PROMETHEUS_URL:-http://prometheus:9090}/api/v1/write
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors:
        - local-blocks
        - service-graphs
        - span-metrics