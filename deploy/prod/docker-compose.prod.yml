services:
  otel-collector:
    ports:
      - "${OTLP_GRPC_PORT:-4317}:4317"
      - "${OTLP_HTTP_PORT:-4318}:4318"
    restart: unless-stopped

  prometheus:
    ports: []
    restart: unless-stopped
    volumes:
      - prom_data_prod:/prometheus

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    networks: [obs]
    environment:
      MINIO_ROOT_USER: "${LOKI_S3_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${LOKI_S3_SECRET_KEY}"
      MINIO_BUCKET_LOKI: "${LOKI_S3_BUCKET}"
      MINIO_BUCKET_TEMPO: "${TEMPO_S3_BUCKET}"
      S3_ENDPOINT: "${LOKI_S3_ENDPOINT}"
      MINIO_SCHEME: "${MINIO_SCHEME:-http}"
    entrypoint: >
      /bin/sh -c " until /usr/bin/mc alias set remote $${MINIO_SCHEME}://$${S3_ENDPOINT} $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo 'waiting for remote minio at $${MINIO_SCHEME}://$${S3_ENDPOINT}...'; sleep 5;
      done; /usr/bin/mc mb -p remote/$${MINIO_BUCKET_LOKI} || true; /usr/bin/mc mb -p remote/$${MINIO_BUCKET_TEMPO} || true; /usr/bin/mc anonymous set none remote/$${MINIO_BUCKET_LOKI} || true; /usr/bin/mc anonymous set none remote/$${MINIO_BUCKET_TEMPO} || true; echo 'remote minio buckets ready'; exit 0; "
    restart: "no"
    extra_hosts:
      - "minio.ecofuturo.com.bo:host-gateway"
      - "minio-console.ecofuturo.com.bo:host-gateway"

  loki:
    ports: []
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yml
      - -config.expand-env=true
    environment:
      LOKI_S3_BUCKET: "${LOKI_S3_BUCKET}"
      LOKI_S3_ENDPOINT: "${LOKI_S3_ENDPOINT:-minio:9000}"
      LOKI_S3_ACCESS_KEY: "${LOKI_S3_ACCESS_KEY}"
      LOKI_S3_SECRET_KEY: "${LOKI_S3_SECRET_KEY}"
      LOKI_S3_REGION: "${LOKI_S3_REGION:-us-east-1}"
      LOKI_S3_INSECURE: "${LOKI_S3_INSECURE:-false}"
    volumes:
      - loki_data_prod:/loki
      - ./deploy/prod/config/loki.yml:/etc/loki/config.yml:ro
    extra_hosts:
      - "minio.ecofuturo.com.bo:host-gateway"
      - "minio-console.ecofuturo.com.bo:host-gateway"

  tempo:
    ports: []
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo.yaml
      - -config.expand-env=true
    environment:
      TEMPO_S3_BUCKET: "${TEMPO_S3_BUCKET}"
      TEMPO_S3_ENDPOINT: "${TEMPO_S3_ENDPOINT}"
      TEMPO_S3_REGION: "${TEMPO_S3_REGION}"
      TEMPO_S3_ACCESS_KEY: "${TEMPO_S3_ACCESS_KEY}"
      TEMPO_S3_SECRET_KEY: "${TEMPO_S3_SECRET_KEY}"
      TEMPO_S3_INSECURE: "${TEMPO_S3_INSECURE}"
      TEMPO_S3_SKIP_VERIFY: "${TEMPO_S3_SKIP_VERIFY}"
      TEMPO_BLOCK_RETENTION: "${TEMPO_BLOCK_RETENTION}"
      TEMPO_STORAGE_DIR: "${TEMPO_STORAGE_DIR}"
      TEMPO_HTTP_LISTEN_PORT: "${TEMPO_HTTP_LISTEN_PORT}"
      TEMPO_GRPC_LISTEN_PORT: "${TEMPO_GRPC_LISTEN_PORT}"
      TEMPO_HTTP_RECEIVER_PORT: "${TEMPO_HTTP_RECEIVER_PORT}"
      TEMPO_FRONTEND_PORT: "${TEMPO_FRONTEND_PORT}"
    volumes:
      - tempo_data_prod:/var/tempo
      - ./deploy/prod/config/tempo.yml:/etc/tempo.yaml:ro
    extra_hosts:
      - "minio.ecofuturo.com.bo:host-gateway"
      - "minio-console.ecofuturo.com.bo:host-gateway"

  grafana:
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped
    environment:
      GF_SERVER_DOMAIN: "${DOMAIN_NAME}"
      GF_SERVER_ROOT_URL: "${GRAFANA_URL}"
      GF_AUTH_LDAP_ENABLED: "true"
      GF_AUTH_LDAP_CONFIG_FILE: "/etc/grafana/ldap.toml"
    volumes:
      - ./deploy/prod/config/grafana.ini:/etc/grafana/grafana.ini:ro

  alloy:
    ports: []
    restart: unless-stopped
    environment:
      ALLOY_ENV: "${ALLOY_ENV:-prod}"
    volumes:
      - alloy_data_prod:/var/lib/alloy/data
      - ${PROD_LOGS_PATH:-/var/log/banco}:/var/log/bank-apis:ro
      - ./deploy/prod/config/alloy.alloy:/etc/alloy/config.alloy:ro

  sql-poller:
    restart: unless-stopped
    environment:
      SqlPoller__ConnectionString: "${SQLSERVER_CONN}"
      SqlPoller__IntervalSeconds: "${SQL_POLLER_INTERVAL:-60}"

  fcm-bridge:
    ports: []
    restart: unless-stopped
    environment:
      BRIDGE_API_KEY: "${BRIDGE_API_KEY}"

  redis:
    ports: []
    restart: unless-stopped
    volumes:
      - redis_data_prod:/data

  openldap:
    environment:
      - LDAP_DOMAIN=${LDAP_DOMAIN}
      - LDAP_ADMIN_PASSWORD=${LDAP_BIND_PASSWORD}
      - LDAP_TLS=false
      - LDAP_REMOVE_CONFIG_AFTER_SETUP=false
      - LDAP_RFC2307BIS_SCHEMA=true
    volumes:
      - ./deploy/prod/config/ldap:/container/service/slapd/assets/config/bootstrap/ldif/custom
    networks: [obs]

volumes:
  prom_data_prod:
  loki_data_prod:
  tempo_data_prod:
  alloy_data_prod:
  redis_data_prod:
