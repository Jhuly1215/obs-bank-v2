services:
  # --- INIT-CONFIG (Pre-procesador de plantillas en Producción) ---
  config-init:
    image: alpine:3.21
    command: >
      sh -c "apk add --no-cache gettext && 
             envsubst < /tmp/templates/ldap.prod.toml.template > /etc/shared/ldap.toml"
    environment:
      - LDAP_SERVER_HOST=${LDAP_SERVER_HOST}
      - LDAP_SERVER_PORT=${LDAP_SERVER_PORT}
      - LDAP_USE_SSL=${LDAP_USE_SSL}
      - LDAP_BIND_DN=${LDAP_BIND_DN}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE}
      - LDAP_ADMIN_GROUP=${LDAP_GROUP_ADMIN}
      - LDAP_VIEWER_GROUP=${LDAP_GROUP_VIEWER}
    volumes:
      - ./deploy/prod/ldap.prod.toml.template:/tmp/templates/ldap.prod.toml.template:ro
      - shared_config:/etc/shared
    networks: [ obs ]

  otel-collector:
    ports:
      - "${OTLP_GRPC_PORT:-4317}:4317"
      - "${OTLP_HTTP_PORT:-4318}:4318"
    restart: unless-stopped

  prometheus:
    ports: []
    restart: unless-stopped
    volumes:
      - prom_data_prod:/prometheus

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - minio_data_prod:/data
    networks: [ obs ]
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on: [ minio ]
    networks: [ obs ]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
      MINIO_BUCKET_LOKI: "${MINIO_BUCKET_LOKI}"
      MINIO_BUCKET_TEMPO: "${MINIO_BUCKET_TEMPO}"
    entrypoint: >
      /bin/sh -c " until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        echo 'waiting for minio...'; sleep 2;
      done; /usr/bin/mc mb -p local/${MINIO_BUCKET_LOKI} || true; /usr/bin/mc mb -p local/${MINIO_BUCKET_TEMPO} || true; /usr/bin/mc anonymous set none local/${MINIO_BUCKET_LOKI} || true; /usr/bin/mc anonymous set none local/${MINIO_BUCKET_TEMPO} || true; echo 'minio buckets ready'; exit 0; "
    restart: "no"

  loki:
    ports: []
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yml
      - -config.expand-env=true
    environment:
      LOKI_S3_BUCKET: "${MINIO_BUCKET_LOKI}"
      LOKI_S3_ENDPOINT: "${LOKI_S3_ENDPOINT:-minio:9000}"
      LOKI_S3_ACCESS_KEY: "${MINIO_ROOT_USER}"
      LOKI_S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      LOKI_S3_REGION: "${LOKI_S3_REGION:-us-east-1}"
    volumes:
      - loki_data_prod:/loki
      - ./deploy/prod/config/loki.yml:/etc/loki/config.yml:ro

  tempo:
    ports: []
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo.yaml
      - -config.expand-env=true
    environment:
      TEMPO_S3_BUCKET: "${MINIO_BUCKET_TEMPO}"
      TEMPO_S3_ENDPOINT: "${TEMPO_S3_ENDPOINT:-minio:9000}"
      TEMPO_S3_ACCESS_KEY: "${MINIO_ROOT_USER}"
      TEMPO_S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      TEMPO_S3_INSECURE: "${TEMPO_S3_INSECURE:-true}"
    volumes:
      - tempo_data_prod:/var/tempo
      - ./deploy/prod/config/tempo.yml:/etc/tempo.yaml:ro

  grafana:
    ports: []
    restart: unless-stopped
    environment:
      GF_SERVER_DOMAIN: "${DOMAIN_NAME}"
      GF_SERVER_ROOT_URL: "${GRAFANA_URL}"
      GF_AUTH_LDAP_ENABLED: "true"
      GF_AUTH_LDAP_CONFIG_FILE: "/etc/grafana/ldap.toml"
    volumes:
      # Usamos el archivo generado por config-init en Prod también
      - shared_config:/etc/grafana:ro
      - ./deploy/prod/config/grafana.ini:/etc/grafana/grafana.ini:ro
    depends_on:
      config-init:
        condition: service_completed_successfully

  alloy:
    ports: []
    restart: unless-stopped
    environment:
      ALLOY_ENV: "${ALLOY_ENV:-prod}"
    volumes:
      - alloy_data_prod:/var/lib/alloy/data
      - ${PROD_LOGS_PATH:-/var/log/banco}:/var/log/bank-apis:ro
      - ./deploy/prod/config/alloy.alloy:/etc/alloy/config.alloy:ro

  demo-api:
    ports: []
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production

  sql-poller:
    restart: unless-stopped
    environment:
      SqlPoller__ConnectionString: "${SQLSERVER_CONN}"
      SqlPoller__IntervalSeconds: "${SQL_POLLER_INTERVAL:-60}"

  fcm-bridge:
    ports: []
    restart: unless-stopped
    environment:
      BRIDGE_API_KEY: "${BRIDGE_API_KEY}"

  redis:
    ports: []
    restart: unless-stopped
    volumes:
      - redis_data_prod:/data

  nginx:
    image: nginx:1.27.4-stable-alpine
    container_name: obs-bank-v2-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
    volumes:
      - ./deploy/prod/config/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./deploy/prod/certs:/etc/nginx/certs:ro
    networks: [ obs ]
    depends_on: [ grafana ]

  openldap:
    profiles: [ disable ]

volumes:
  prom_data_prod:
  loki_data_prod:
  tempo_data_prod:
  alloy_data_prod:
  redis_data_prod:
  minio_data_prod:
  shared_config: # Re-usamos el volumen de configuración compartida
