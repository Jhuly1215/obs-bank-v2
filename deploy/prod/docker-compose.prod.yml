services:
  # =========================
  # Colector OTLP
  # 4317/4318 permanecen expuestos para recibir trazas de las APIs externas
  # =========================
  otel-collector:
    ports:
      - "${OTLP_GRPC_PORT:-4317}:4317"
      - "${OTLP_HTTP_PORT:-4318}:4318"
    restart: unless-stopped

  prometheus:
    ports: []
    restart: unless-stopped
    volumes:
      - prom_data_prod:/prometheus

  # =========================
  # MINIO S3 (ALMACENAMIENTO DE PRODUCCIÓN)
  # =========================
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    env_file:
      - ./deploy/prod/.env
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - minio_data_prod:/data
    networks:
      - obs
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      - minio
    networks:
      - obs
    env_file:
      - ./deploy/prod/.env
    entrypoint: >
      /bin/sh -c " until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        echo 'waiting for minio...'; sleep 2;
      done; /usr/bin/mc mb -p local/${MINIO_BUCKET_LOKI} || true; /usr/bin/mc mb -p local/${MINIO_BUCKET_TEMPO} || true; /usr/bin/mc anonymous set none local/${MINIO_BUCKET_LOKI} || true; /usr/bin/mc anonymous set none local/${MINIO_BUCKET_TEMPO} || true; echo 'minio buckets ready'; exit 0; "
    restart: "no"

  # =========================
  # LOKI (USANDO AWS S3 MINIO)
  # =========================
  loki:
    ports: []
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yml
      - -config.expand-env=true
    env_file:
      - deploy/prod/.env
    environment:
      LOKI_S3_BUCKET: "${LOKI_S3_BUCKET}"
      LOKI_S3_ENDPOINT: "${LOKI_S3_ENDPOINT}"
      LOKI_S3_ACCESS_KEY: "${LOKI_S3_ACCESS_KEY}"
      LOKI_S3_SECRET_KEY: "${LOKI_S3_SECRET_KEY}"
      LOKI_S3_REGION: "${LOKI_S3_REGION}"
    volumes:
      - loki_data_prod:/loki
      - ./observability/loki-config.prod.yml:/etc/loki/config.yml:ro

  # =========================
  # TEMPO (USANDO AWS S3 MINIO)
  # =========================
  tempo:
    ports: []
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo.yaml
      - -config.expand-env=true
    env_file:
      - deploy/prod/.env
    environment:
      TEMPO_S3_BUCKET: "${TEMPO_S3_BUCKET}"
      TEMPO_S3_ENDPOINT: "${TEMPO_S3_ENDPOINT}"
      TEMPO_S3_ACCESS_KEY: "${TEMPO_S3_ACCESS_KEY}"
      TEMPO_S3_SECRET_KEY: "${TEMPO_S3_SECRET_KEY}"
      TEMPO_S3_INSECURE: "${TEMPO_S3_INSECURE}"
    volumes:
      - tempo_data_prod:/var/tempo
      - ./observability/tempo.s3.yml:/etc/tempo.yaml:ro

  # =========================
  # GRAFANA & AD
  # =========================
  grafana:
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped
    env_file:
      - deploy/prod/.env
    volumes:
      - ./deploy/prod/ldap.prod.toml:/etc/grafana/ldap.toml:ro
      - ./observability/grafana/grafana.prod.ini:/etc/grafana/grafana.ini:ro

  alloy:
    ports: []
    restart: unless-stopped
    environment:
      ALLOY_ENV: "${ALLOY_ENV:-prod}"
    volumes:
      - alloy_data_prod:/var/lib/alloy/data
      - ${PROD_LOGS_PATH:-/var/log/banco}:/var/log/bank-apis:ro
      - ./observability/alloy/config.alloy.prod:/etc/alloy/config.alloy:ro

  demo-api:
    ports: []
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production

  sql-poller:
    restart: unless-stopped
    environment:
      SqlPoller__ConnectionString: "${SQLSERVER_CONN}"
      SqlPoller__IntervalSeconds: "${SQL_POLLER_INTERVAL:-60}"

  fcm-bridge:
    ports: []
    restart: unless-stopped
    environment:
      BRIDGE_API_KEY: "${BRIDGE_API_KEY}"

  redis:
    ports: []
    restart: unless-stopped
    volumes:
      - redis_data_prod:/data

  openldap:
    profiles:
      - disable

volumes:
  prom_data_prod:
  loki_data_prod:
  tempo_data_prod:
  alloy_data_prod:
  redis_data_prod:
  minio_data_prod:
