name: obs-bank-v2

# --- PLANTILLA DE OBSERVABILIDAD ZERO-CODE ---
# Úsala en cualquier API externa con: <<: *otel-base
x-otel-base: &otel-base
  environment:
    - CORECLR_ENABLE_PROFILING=1
    - CORECLR_PROFILER={ff15165d-5152-4531-90f6-bc61ef90a334}
    - CORECLR_PROFILER_PATH=/otel-auto/linux-x64/OpenTelemetry.DotNet.Auto.Native.so
    - DOTNET_STARTUP_HOOKS=/otel-auto/net/OpenTelemetry.DotNet.Auto.dll
    - OTEL_DOTNET_AUTO_HOME=/otel-auto
    - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_AGENT_ENDPOINT}
    - OTEL_LOGS_EXPORTER=${OTEL_AGENT_LOGS_EXPORT}
    - OTEL_METRICS_EXPORTER=${OTEL_AGENT_METRICS_EXPORT}
    - OTEL_TRACES_EXPORTER=${OTEL_AGENT_TRACES_EXPORT}
    - OTEL_DOTNET_AUTO_LOGS_INCLUDE_FORMATTED_MESSAGE=true
  volumes:
    - otel_binaries:/otel-auto:ro
  networks:
    - obs
  depends_on:
    - otel-agent-provider
    - otel-collector

services:
  # Proveedor de binarios del Agente OpenTelemetry (No requiere ejecución, solo copia archivos)
  otel-agent-provider:
    image: ghcr.io/open-telemetry/opentelemetry-dotnet-instrumentation/otel-dotnet-auto-instrumentation:${OTEL_AGENT_VERSION}
    volumes:
      - otel_binaries:/instrumentation

  # =========================
  # CORE OBSERVABILIDAD
  # =========================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    command: [ "--config=/etc/otelcol/config.yml" ]
    volumes:
      - ./observability/otel-collector-config.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    networks: [ obs ]

  prometheus:
    image: prom/prometheus:v3.11.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    networks: [ obs ]

  loki:
    image: grafana/loki:3.7.0
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    networks: [ obs ]

  tempo:
    image: grafana/tempo:2.10.3
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks: [ obs ]

  grafana:
    image: grafana/grafana:12.4.2
    container_name: grafana
    restart: unless-stopped

    environment:
      GF_SECURITY_ADMIN_USER: "${GF_SECURITY_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD}"

      # === SMTP (EMAIL ALERTS) ===
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "${GF_SMTP_HOST}"
      GF_SMTP_USER: "${GF_SMTP_USER}"
      GF_SMTP_PASSWORD: "${GF_SMTP_PASSWORD}"
      GF_SMTP_FROM_ADDRESS: "${GF_SMTP_FROM_ADDRESS}"
      GF_SMTP_FROM_NAME: "${GF_SMTP_FROM_NAME}"
      GF_SMTP_SKIP_VERIFY: "false"
      GF_SMTP_STARTTLS_POLICY: "MandatoryStartTLS"

      # === LDAP AUTHENTICATION ===
      GF_AUTH_LDAP_ENABLED: "true"
      GF_AUTH_LDAP_CONFIG_FILE: "/etc/grafana/ldap.toml"
      GF_AUTH_LDAP_ALLOW_SIGN_UP: "true"
    volumes:
      - ./observability/grafana/data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      #LDAP
      - ./observability/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./observability/grafana/ldap.toml:/etc/grafana/ldap.toml:ro
      - ./observability/certs/ca-banco.pem:/etc/ssl/certs/ca-banco.pem:ro

    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks: [ obs ]

  # =========================
  # INGESTA LOGS (TXT/JSON)
  # =========================
  alloy:
    image: grafana/alloy:v1.15.0
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./sample-logs:/var/log/bank-apis:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      - loki
    networks: [ obs ]

  # =========================
  # API DEMO .NET 9 (OTEL)
  # =========================
  demo-api:
    build:
      context: ./services/Bank.Obs.DemoApi/Bank.Obs.DemoApi
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      SQLSERVER_CONN: ${SQLSERVER_CONN}
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
      OpenTelemetry__ServiceName: bank-obs-demo-api
      OpenTelemetry__ServiceVersion: 2.0.0
    ports:
      - "5000:8080"
    depends_on:
      - otel-collector
    networks: [ obs ]

  # =========================
  # SQL POLLER .NET 9 (MÉTRICAS DESDE SQL SERVER)
  # =========================
  sql-poller:
    build:
      context: ./services/Bank.Obs.SqlPoller/Bank.Obs.SqlPoller
      dockerfile: Dockerfile
    environment:
      SqlPoller__ConnectionString: ${SQLSERVER_CONN}
      SqlPoller__IntervalSeconds: 60
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
      OpenTelemetry__ServiceName: bank-sql-poller
      OpenTelemetry__ServiceVersion: 2.0.0
    depends_on:
      - otel-collector
    networks: [ obs ]
    restart: unless-stopped

  redis:
    image: redis:7.4.8-alpine
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    networks: [ obs ]
    restart: unless-stopped

  # =========================
  # Grafana FCM Bridge (Alertas a Android Push)
  # =========================
  fcm-bridge:
    build:
      context: ./services/Bank.Obs.FcmBridge/Bank.Obs.FcmBridge
      dockerfile: Dockerfile
    environment:
      # Debe montarse en este path dentro del container
      GOOGLE_APPLICATION_CREDENTIALS: /etc/secrets/firebase-service-account.json
      # Pasamos el bearer token de autenticación
      BRIDGE_API_KEY: ${BRIDGE_API_KEY:-dev_key_super_secret_123}
    volumes:
      # Montamos el service-account desde observability/certs (se asume que el user lo pegará allí)
      - ./observability/certs/firebase-service-account.json:/etc/secrets/firebase-service-account.json:ro
    networks: [ obs ]
    restart: unless-stopped

  # =========================
  # MOCK LDAP OPENLDAP SERVER
  # =========================
  openldap:
    image: osixia/openldap:1.5.0
    container_name: obs-bank-v2-ldap-1
    ports:
      - "389:389"
    environment:
      - LDAP_DOMAIN=planetexpress.com
    networks: [ obs ]

networks:
  obs:
    driver: bridge

volumes:
  prom_data:
  loki_data:
  tempo_data:
  alloy_data:
  redis_data:
  otel_binaries:
