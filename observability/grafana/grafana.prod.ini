[auth.ldap]
enabled = true
config_file = /etc/grafana/ldap.toml
allow_sign_up = true

[users]
auto_assign_org = true
auto_assign_org_role = Viewer

# El servidor y la URL pública de Grafana se leen desde variables de entorno:
# GF_SERVER_DOMAIN y GF_SERVER_ROOT_URL se pasan directamente vía docker-compose env_file.
# Grafana las detecta automáticamente sin necesidad de definirlas aquí.
# Solo se necesita este ini para auth y users por ahora.
