apiVersion: 1

policies:
  - orgId: 1
    receiver: FCM-BRIDGE
    group_by:
      - grafana_folder
      - alertname
    group_wait: 10s
    group_interval: 1m
    repeat_interval: 30m
    routes:
      - receiver: FCM-BRIDGE
        object_matchers:
          - ["channel", "=", "mobile"]
        group_by:
          - grafana_folder
          - alertname
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 30m
        continue: false