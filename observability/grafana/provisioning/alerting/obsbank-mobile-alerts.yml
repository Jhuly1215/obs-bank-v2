            datasourceUid: prometheus
            relativeTimeRange:
              from: 86400
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: sum(tx_failed_technical_count_24h{source=~"intra|inter"}) > bool 10
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
