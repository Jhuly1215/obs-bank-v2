              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: sum(tx_review_dead_count{source=~"intra|inter"}) > bool 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A

          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              type: reduce
              refId: B

          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                    params: []
                  type: query
              refId: C

        noDataState: OK
        execErrState: Error
        for: 1m
