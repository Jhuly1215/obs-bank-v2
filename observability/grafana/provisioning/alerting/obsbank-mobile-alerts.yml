apiVersion: 1

groups:
  - orgId: 1
    name: ObsBank Mobile Alerts
    folder: ObsBank
    interval: 1m
    rules:
      # ==========================================================
      # 0. PRUEBA CONTROLADA DE PUSH MÓVIL
      # Activar temporalmente cambiando isPaused: false.
      # ==========================================================
      - uid: obsbank_push_test
        title: ObsBankPushTest
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 60
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: vector(1)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A

          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              type: reduce
              refId: B

          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                    params: []
                  type: query
              refId: C

        noDataState: OK
        execErrState: Error
        for: 30s
        labels:
          severity: info
          service: fcm-bridge
          channel: mobile
        annotations:
          summary: "Prueba móvil FCM"
          description: "Prueba de Grafana → FcmBridge → Firebase → App móvil."
          dashboardUrl: "https://obs.ecofuturo.com.bo"
          panelUrl: "https://obs.ecofuturo.com.bo"
        isPaused: true

      # ==========================================================
      # 1. SQL POLLER SIN EJECUCIÓN EXITOSA
      # ==========================================================
      - uid: sql_poller_sin_poll_exitoso
        title: SqlPollerSinPollExitoso
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: (time() - max(sql_poller_last_success_timestamp)) > bool 180
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A

          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              type: reduce
              refId: B

          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                    params: []
                  type: query
              refId: C

        noDataState: Alerting
        execErrState: Error
        for: 2m
        labels:
          severity: critical
          service: bank-sql-poller
          channel: mobile
        annotations:
          summary: "SQL Poller sin ejecución exitosa"
          description: "El SQL Poller no registra una ejecución exitosa hace más de 3 minutos."
          dashboardUrl: "https://obs.ecofuturo.com.bo"
          panelUrl: "https://obs.ecofuturo.com.bo"

      # ==========================================================
      # 2. FALLOS CONSECUTIVOS DEL POLLER
      # ==========================================================
      - uid: sql_poller_fallos_consecutivos
        title: SqlPollerFallosConsecutivos
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: max(sql_poller_consecutive_failures) >= bool 3
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A

          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              type: reduce
              refId: B

          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                    params: []
                  type: query
              refId: C

        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: critical
          service: bank-sql-poller
          channel: mobile
        annotations:
          summary: "Fallos consecutivos en SQL Poller"
          description: "El SQL Poller acumula 3 o más ciclos fallidos contra la base monitoreada."
          dashboardUrl: "https://obs.ecofuturo.com.bo"
          panelUrl: "https://obs.ecofuturo.com.bo"

      # ==========================================================
      # 3. CERO TRANSACCIONES RECIENTES
      # Ojo: calibrar por horario. De madrugada puede generar ruido.
      # ==========================================================
      - uid: cero_transacciones_15m
        title: CeroTransaccionesUltimos15Min
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: sum(tx_created_total_15m{source=~"intra|inter"}) == bool 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A

          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              type: reduce
              refId: B

          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                    params: []
                  type: query
              refId: C

        noDataState: OK
        execErrState: Error
        for: 3m
        labels:
          severity: critical
          service: bank-sql-poller
          channel: mobile
        annotations:
          summary: "Cero transacciones recientes"
          description: "No se detectaron transacciones intra ni interbancarias en los últimos 15 minutos."
          dashboardUrl: "https://obs.ecofuturo.com.bo"
          panelUrl: "https://obs.ecofuturo.com.bo"

      # ==========================================================
      # 4. TRANSACCIONES EN REVISIÓN ESTANCADAS
