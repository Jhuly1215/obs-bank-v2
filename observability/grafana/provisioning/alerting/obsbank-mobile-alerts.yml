apiVersion: 1

groups:
  - orgId: 1
    name: obsbank-core-operacion
    folder: ObsBank
    interval: 1m
    rules:
      - uid: obsbank_sql_poller_stale_critical
        title: SqlPollerStaleCritical
        condition: B
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: "El SQL Poller no reporta éxito reciente"
          description: "La métrica sql_poller_last_success_timestamp no se actualiza. El stack puede seguir visible, pero los datos dejan de ser confiables."
          __dashboardUid__: "obsbank-operacion-v33"
          __panelId__: "1016"
        labels:
          severity: critical
          channel: mobile
          scope: poller
          component: sql-poller
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: time() - max(sql_poller_last_success_timestamp{service_name="bank-sql-poller"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [180]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold

