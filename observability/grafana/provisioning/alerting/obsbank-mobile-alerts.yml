        title: LatenciaP95Alta
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: max(tx_success_p95_seconds{source=~"intra|inter"}) > bool 60
              instant: true
