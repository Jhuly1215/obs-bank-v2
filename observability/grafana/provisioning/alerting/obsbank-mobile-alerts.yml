          severity: critical
          service: bank-sql-poller
          channel: mobile
        annotations:
          summary: "Transacciones en revisión estancadas"
          description: "Existen transacciones en estado de revisión por más tiempo del permitido."
          dashboardUrl: "https://obs.ecofuturo.com.bo"
          panelUrl: "https://obs.ecofuturo.com.bo"

      # ==========================================================
      # 5. BACKLOG OPERATIVO MAYOR A 15 MINUTOS
      # ==========================================================
      - uid: backlog_operativo_mayor_15m
        title: BacklogOperativoMayor15Min
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              expr: sum(tx_pending_aging_bucket_count{bucket="ge_900s"}) > bool 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A

          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              type: reduce
              refId: B

          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
