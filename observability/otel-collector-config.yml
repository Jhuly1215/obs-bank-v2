receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1000
    timeout: 5s
  memory_limiter:
    check_interval: 1s
    # Aumentado para soportar volumen de producción con múltiples servicios enviando trazas
    limit_mib: 1024
    spike_limit_mib: 256

  # Estandarizado: service_name es la etiqueta principal para filtrar en Grafana
  resource/loki_labels:
    attributes:
      - action: insert
        key: loki.resource.labels
        value: service.name, service_name, service.version

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    resource_to_telemetry_conversion:
      enabled: true

  otlphttp/loki:
    endpoint: "${LOKI_URL}/otlp"
    tls:
      insecure: true

  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # El exporter debug se ELIMINA de producción — genera log verboso masivo
  # Para re-habilitarlo en dev, agregar "debug" al pipeline y descomentar:
  # debug:
  #   verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/loki_labels, batch]
      exporters: [otlphttp/loki]
