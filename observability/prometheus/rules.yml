groups:
  - name: ObsBank_Infrastructure
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instancia {{ $labels.instance }} caída"
          description: "La instancia {{ $labels.instance }} del servicio {{ $labels.job }} ha estado inaccesible por más de 1 minuto."

  - name: ObsBank_Performance
    rules:
      - alert: HostHighCpuLoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Carga de CPU Alta en {{ $labels.instance }}"
          description: "El uso de CPU es superior al 80% durante los últimos 5 minutos."

  - name: ObsBank_Business_Metrics
    rules:
      - alert: ZeroTransactionsDetected
        expr: rate(sql_poller_transaction_count[5m]) == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Anomalía: Cero Transacciones Detectadas"
          description: "No se han detectado transacciones en la DB central (Econet) en los últimos 10 minutos. Verificar conectividad SQL."
