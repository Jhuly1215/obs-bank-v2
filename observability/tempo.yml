server:
  http_listen_port: ${TEMPO_HTTP_LISTEN_PORT}

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:${TEMPO_GRPC_LISTEN_PORT}
        http:
          endpoint: 0.0.0.0:${TEMPO_HTTP_RECEIVER_PORT}

storage:
  trace:
    backend: local
    local:
      path: ${TEMPO_STORAGE_DIR}/traces
    wal:
      path: ${TEMPO_STORAGE_DIR}/wal

compactor:
  compaction:
    block_retention: 2160h

querier:
  frontend_worker:
    frontend_address: 127.0.0.1:${TEMPO_FRONTEND_PORT}

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s
  metrics:
    max_duration: 3h

metrics_generator:
  registry:
    external_labels:
      source: tempo
  processor:
    local_blocks:
      flush_to_storage: true
  traces_storage:
    path: ${TEMPO_STORAGE_DIR}/generator/traces
  storage:
    path: ${TEMPO_STORAGE_DIR}/generator/wal
    remote_write:
      - url: ${PROMETHEUS_URL}/api/v1/write
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors: [local-blocks, service-graphs, span-metrics]
